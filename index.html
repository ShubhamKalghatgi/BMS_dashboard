<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Temperature Dashboard</title>

  <!-- Tailwind (same as your reference UI) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="bg-stone-100 text-stone-800">

<!-- NAVBAR -->
<nav class="bg-white shadow-sm border-b border-stone-200">
  <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-stone-800">
      🌡 TempMonitor
    </h1>
    <span class="text-sm text-stone-500">Live Data</span>
  </div>
</nav>

<!-- HERO -->
<section class="py-16 text-center bg-gradient-to-r from-amber-100 to-amber-50">
  <h1 class="text-4xl font-bold mb-4 text-stone-900">
    Live Temperature Dashboard
  </h1>
  <p class="text-stone-600">
    Real-time data powered by ThingSpeak
  </p>
</section>

<!-- MAIN CARD -->
<section class="py-16">
  <div class="max-w-4xl mx-auto px-4">

    <div class="bg-white rounded-2xl shadow-lg p-10 text-center">

      <h2 class="text-lg text-stone-500 mb-2">
        Current Temperature
      </h2>

      <div id="temp" class="text-6xl font-bold text-amber-600 mb-4">
        Loading...
      </div>

      <p id="time" class="text-stone-500">
        Updating...
      </p>

    </div>

  </div>
</section>

<!-- OPTIONAL SECOND CARD -->
<section class="pb-16">
  <div class="max-w-4xl mx-auto px-4">
    <div class="bg-white rounded-xl shadow p-6 text-center">
      <h3 class="text-stone-700 font-semibold mb-2">
        Status
      </h3>
      <p id="status" class="text-green-600 font-medium">
        Connecting...
      </p>
    </div>
  </div>
</section>

<!-- SCRIPT (YOUR ORIGINAL LOGIC — NOT CHANGED) -->
<script>
const CHANNEL_ID = "3340711";
const READ_API_KEY = "RJ2R0JGM9PFKAMLD";

// cache-busting URL
function getURL() {
  return `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?api_key=${READ_API_KEY}&results=1&_=${new Date().getTime()}`;
}

async function getData() {
  try {
    document.getElementById("status").innerText = "Fetching latest data...";

    const response = await fetch(getURL());
    const data = await response.json();

    const latest = data.feeds[0];

    if (latest) {
      document.getElementById("temp").innerText =
        latest.field1 + " °C";

      document.getElementById("time").innerText =
        "Updated: " + new Date(latest.created_at).toLocaleString();

      document.getElementById("status").innerText = "Live ✅";
    } else {
      document.getElementById("status").innerText = "No data yet";
    }

  } catch (error) {
    console.error(error);
    document.getElementById("status").innerText = "Error ❌";
  }
}

// auto refresh
setInterval(getData, 15000);
getData();
</script>

</body>
</html>
