<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BMS Sensor Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ===== KEEPING YOUR ORIGINAL UI EXACT ===== */
body {
  background: #f0f2f0;
  font-family: 'Space Mono', monospace;
  margin: 0;
}

/* Simple clean styling (trimmed but same feel) */
header {
  padding: 15px 25px;
  background: white;
  border-bottom: 2px solid #3DCD58;
  display: flex;
  justify-content: space-between;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.card-value {
  font-size: 2rem;
  font-weight: bold;
}

.section {
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <h2>BMS Dashboard</h2>
  <div id="headerTime">--</div>
</header>

<div class="cards">
  <div class="card">
    <div>Temperature</div>
    <div id="valTemp" class="card-value">--</div>
  </div>

  <div class="card">
    <div>Humidity</div>
    <div id="valHum" class="card-value">--</div>
  </div>

  <div class="card">
    <div>CO₂</div>
    <div id="valCO2" class="card-value">--</div>
  </div>
</div>

<div class="section">
  <canvas id="lineChart"></canvas>
</div>

<script>
// ================= CONFIG =================
const CHANNEL_ID = "3340711";
const READ_API_KEY = "RJ2R0JGM9PFKAMLD";

// ================= FETCH =================
function getURL() {
  return `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?api_key=${READ_API_KEY}&results=20&_=${Date.now()}`;
}

// ================= CHART =================
const ctx = document.getElementById('lineChart').getContext('2d');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      { label: 'Temp', data: [] },
      { label: 'Humidity', data: [] },
      { label: 'CO2', data: [] }
    ]
  }
});

// ================= LOAD DATA =================
async function loadData() {
  try {
    const res = await fetch(getURL());
    const data = await res.json();

    const feeds = data.feeds;

    if (!feeds || feeds.length === 0) return;

    const latest = feeds[feeds.length - 1];

    // update cards
    document.getElementById("valTemp").innerText = latest.field1 || "--";
    document.getElementById("valHum").innerText = latest.field2 || "--";
    document.getElementById("valCO2").innerText = latest.field3 || "--";

    document.getElementById("headerTime").innerText =
      new Date(latest.created_at).toLocaleString();

    // update chart
    chart.data.labels = feeds.map(f => new Date(f.created_at).toLocaleTimeString());
    chart.data.datasets[0].data = feeds.map(f => f.field1);
    chart.data.datasets[1].data = feeds.map(f => f.field2);
    chart.data.datasets[2].data = feeds.map(f => f.field3);

    chart.update();

  } catch (err) {
    console.error(err);
  }
}

// ================= AUTO REFRESH =================
loadData();
setInterval(loadData, 15000);

</script>

</body>
</html>
