<!DOCTYPE html>
<html>
<head>
  <title>Live Temperature</title>
</head>
<body>

<h1>🌡 Live Temperature</h1>
<h2 id="temp">Loading...</h2>
<p id="time"></p>

<script>
const CHANNEL_ID = "3340711";
const READ_API_KEY = "RJ2R0JGM9PFKAMLD";

const url = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?api_key=${READ_API_KEY}&results=1`;

async function getData() {
  try {
    const response = await fetch(url);
    const data = await response.json();

    const latest = data.feeds[0];

    if (latest) {
      document.getElementById("temp").innerText =
        latest.field1 + " °C";

      document.getElementById("time").innerText =
        "Updated: " + new Date(latest.created_at).toLocaleString();
    } else {
      document.getElementById("temp").innerText = "No data yet";
    }

  } catch (error) {
    console.error(error);
    document.getElementById("temp").innerText = "Error fetching data";
  }
}

// refresh every 15 sec
setInterval(getData, 15000);
getData();
</script>

</body>
</html>
