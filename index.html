<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BMS Sensor Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f7f5;
  padding: 20px;
}
h1 { color: green; }

.card {
  background: white;
  padding: 20px;
  margin: 10px;
  display: inline-block;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.value {
  font-size: 28px;
  font-weight: bold;
}

canvas {
  margin-top: 30px;
}
</style>
</head>

<body>

<h1>BMS Sensor Dashboard (Remote)</h1>

<div class="card">
  <div>CO₂</div>
  <div class="value" id="co2">--</div>
</div>

<div class="card">
  <div>Temperature</div>
  <div class="value" id="temp">--</div>
</div>

<div class="card">
  <div>Humidity</div>
  <div class="value" id="hum">--</div>
</div>

<canvas id="chart" width="600" height="300"></canvas>

<script>
const CHANNEL_ID = "I5HEQXGJ46F10HHK";
const READ_API_KEY = "I5HEQXGJ46F10HHK";

const REFRESH_MS = 3000;

let chart;

async function loadData() {
  try {
    const res = await fetch(
      `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?api_key=${READ_API_KEY}&results=20`
    );

    const data = await res.json();
    const feeds = data.feeds;

    if (!feeds || feeds.length === 0) return;

    const latest = feeds[feeds.length - 1];

    // Update cards
    document.getElementById("co2").innerText = latest.field1;
    document.getElementById("temp").innerText = latest.field2;
    document.getElementById("hum").innerText = latest.field3;

    // Prepare chart data
    const labels = feeds.map(f => f.created_at.slice(11,19));
    const co2 = feeds.map(f => f.field1);
    const temp = feeds.map(f => f.field2);
    const hum = feeds.map(f => f.field3);

    if (!chart) {
      const ctx = document.getElementById("chart").getContext("2d");

      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels: labels,
          datasets: [
            { label: "CO2", data: co2 },
            { label: "Temp", data: temp },
            { label: "Humidity", data: hum }
          ]
        }
      });

    } else {
      chart.data.labels = labels;
      chart.data.datasets[0].data = co2;
      chart.data.datasets[1].data = temp;
      chart.data.datasets[2].data = hum;
      chart.update();
    }

  } catch (e) {
    console.error("Error:", e);
  }
}

loadData();
setInterval(loadData, REFRESH_MS);
</script>

</body>
</html>
