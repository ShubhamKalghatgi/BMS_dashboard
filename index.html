<!DOCTYPE html>
<html>
<head>
  <title>Live Temperature</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
    .card {
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
      display: inline-block;
    }
    .temp {
      font-size: 40px;
      color: #ff5733;
    }
  </style>
</head>
<body>

<h1>🌡 Live Temperature Monitor</h1>

<div class="card">
  <div id="temp" class="temp">Loading...</div>
  <div id="time"></div>
</div>

<script>
const CHANNEL_ID = "3340677";

const url = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?results=1`;

async function getData() {
  try {
    const res = await fetch(url);
    const data = await res.json();

    const latest = data.feeds[0];

    document.getElementById("temp").innerText =
      latest.field1 + " °C";

    document.getElementById("time").innerText =
      "Updated: " + new Date(latest.created_at).toLocaleString();

  } catch (err) {
    console.error(err);
  }
}

// fetch every 15 sec
setInterval(getData, 15000);
getData();
</script>

</body>
</html>
