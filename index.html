<!DOCTYPE html>
<html>
<head>
  <title>Live Temperature</title>
</head>
<body>

<h1>🌡 Live Temperature</h1>
<h2 id="temp">Loading...</h2>
<p id="time"></p>

<script>
const CHANNEL_ID = "3340711";
const READ_API_KEY = "RJ2R0JGM9PFKAMLD";

// ✅ Prevent caching so new data always loads
function getURL() {
  return `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?api_key=${READ_API_KEY}&results=1&_=${new Date().getTime()}`;
}

async function getData() {
  try {
    const response = await fetch(getURL());
    const data = await response.json();

    const latest = data.feeds[0];

    if (latest) {
      document.getElementById("temp").innerText =
        latest.field1 + " °C";

      document.getElementById("time").innerText =
        "Updated: " + new Date(latest.created_at).toLocaleString();
    }

  } catch (error) {
    console.error("Error:", error);
  }
}

// ✅ Auto-refresh every 15 seconds
setInterval(getData, 15000);

// initial load
getData();
</script>

</body>
</html>
